<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Simba 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#E8620A;--orange-dark:#c04f06;--orange-light:#fff3eb;
  --black:#0e0c0a;--white:#fffcf8;--gray:#6b6560;--gray-light:#f5f2ee;
  --green:#0a6e3f;--green-light:#e8f5ee;--border:rgba(0,0,0,0.09);
  --red:#dc2626;--red-light:#fef2f2;
  --yellow:#f59e0b;--yellow-light:#fffbeb;
  --blue:#2563eb;--blue-light:#eff6ff;
  --sidebar-w:240px;
}
html{scroll-behavior:smooth;}
body{font-family:"DM Sans",sans-serif;background:#f4f1ed;color:var(--black);min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--black);min-height:100vh;
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:50;
}
.sb-logo{
  display:flex;align-items:center;gap:10px;padding:24px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  text-decoration:none;
}
.sb-logo-img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--orange);flex-shrink:0;}
.sb-logo-text{font-family:"Syne",sans-serif;font-weight:700;font-size:16px;color:white;}
.sb-logo-text span{color:var(--orange);}
.sb-section{padding:20px 12px 8px;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin:2px 8px;color:rgba(255,255,255,0.65);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.sb-link:hover{background:rgba(255,255,255,0.07);color:white;}
.sb-link.active{background:rgba(232,98,10,0.18);color:white;}
.sb-link.active .sb-icon{color:var(--orange);}
.sb-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0;}
.sb-badge{margin-left:auto;background:var(--orange);color:white;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;}
.sb-badge.green{background:var(--green);}
.sb-footer{margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,0.08);}
.sb-user{display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0;}
.sb-user-info{}
.sb-user-name{font-size:13px;font-weight:600;color:white;}
.sb-user-role{font-size:11px;color:rgba(255,255,255,0.4);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  background:rgba(255,252,248,0.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:62px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:40;
}
.topbar-title{font-family:"Syne",sans-serif;font-weight:700;font-size:17px;}
.topbar-subtitle{font-size:13px;color:var(--gray);margin-top:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-branch{display:flex;align-items:center;gap:6px;padding:7px 13px;background:var(--orange-light);border:1.5px solid rgba(232,98,10,0.25);border-radius:10px;font-size:13px;font-weight:600;color:var(--orange-dark);cursor:pointer;}
select.branch-select{border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;background:white;color:var(--black);cursor:pointer;outline:none;}
select.branch-select:focus{border-color:var(--orange);}
.lang-toggle{display:flex;gap:3px;}
.lang-toggle button{background:none;border:1.5px solid transparent;border-radius:20px;padding:4px 9px;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;transition:all 0.2s;}
.lang-toggle button.active{border-color:var(--orange);color:var(--orange);}

/* ── CONTENT ── */
.content{padding:28px;flex:1;}
.page{display:none;}
.page.active{display:block;}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi{background:white;border-radius:16px;border:1.5px solid var(--border);padding:20px;transition:all 0.2s;}
.kpi:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.kpi-icon{font-size:26px;margin-bottom:12px;}
.kpi-value{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;line-height:1;}
.kpi-label{font-size:13px;color:var(--gray);margin-top:4px;}
.kpi-delta{font-size:12px;font-weight:600;margin-top:6px;}
.kpi-delta.up{color:var(--green);}
.kpi-delta.down{color:var(--red);}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:"Syne",sans-serif;font-size:17px;font-weight:700;}
.sec-actions{display:flex;gap:8px;}

/* ── ORDERS TABLE ── */
.table-wrap{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:24px;}
.table-filters{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:white;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--gray);}
.filter-btn:hover{border-color:rgba(232,98,10,0.3);color:var(--orange);}
.filter-btn.active{background:var(--orange);border-color:var(--orange);color:white;}
.filter-search{margin-left:auto;display:flex;align-items:center;gap:6px;}
.filter-search input{padding:7px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;outline:none;transition:all 0.2s;}
.filter-search input:focus{border-color:var(--orange);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--gray-light);}
th{padding:11px 14px;text-align:left;font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--gray);}
td{padding:13px 14px;border-top:1px solid var(--border);font-size:14px;vertical-align:middle;}
tr:hover td{background:#fafaf8;}
.order-ref{font-family:"Syne",sans-serif;font-weight:700;font-size:13px;}
.order-customer{font-weight:500;}
.order-phone{font-size:12px;color:var(--gray);}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-pending{background:var(--yellow-light);color:#92400e;}
.badge-confirmed{background:var(--blue-light);color:var(--blue);}
.badge-ready{background:var(--green-light);color:var(--green);}
.badge-picked{background:var(--gray-light);color:var(--gray);}
.badge-cancelled{background:var(--red-light);color:var(--red);}

/* ACTION BUTTONS */
.act-btn{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.2s;font-family:"DM Sans",sans-serif;}
.act-confirm{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
.act-confirm:hover{background:var(--blue);color:white;}
.act-ready{background:var(--green-light);border-color:var(--green);color:var(--green);}
.act-ready:hover{background:var(--green);color:white;}
.act-cancel{background:var(--red-light);border-color:var(--red);color:var(--red);}
.act-cancel:hover{background:var(--red);color:white;}
.act-view{background:var(--gray-light);border-color:var(--border);color:var(--gray);}
.act-view:hover{background:var(--black);color:white;border-color:var(--black);}

/* ── INVENTORY TABLE ── */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px;}
.inv-card{background:white;border-radius:14px;border:1.5px solid var(--border);padding:16px;display:flex;gap:12px;align-items:center;transition:all 0.2s;}
.inv-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07);}
.inv-img{width:52px;height:52px;border-radius:10px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;}
.inv-img img{width:100%;height:100%;object-fit:cover;}
.inv-info{flex:1;min-width:0;}
.inv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.inv-cat{font-size:11px;color:var(--gray);}
.inv-price{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--orange);margin-top:4px;}
.inv-stock{display:flex;align-items:center;gap:6px;margin-top:6px;}
.stock-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stock-dot.in{background:var(--green);}
.stock-dot.out{background:var(--red);}
.stock-label{font-size:12px;font-weight:500;}
.stock-toggle{margin-left:auto;position:relative;width:38px;height:22px;flex-shrink:0;}
.stock-toggle input{opacity:0;width:0;height:0;}
.stock-toggle .slider{position:absolute;inset:0;background:#ddd;border-radius:22px;cursor:pointer;transition:all 0.3s;}
.stock-toggle input:checked + .slider{background:var(--green);}
.stock-toggle .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:all 0.3s;}
.stock-toggle input:checked + .slider::before{transform:translateX(16px);}

/* ── REVIEWS ── */
.reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.review-card{background:white;border-radius:14px;border:1.5px solid var(--border);padding:18px;}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.review-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0;}
.review-meta{}
.review-name{font-weight:600;font-size:14px;}
.review-time{font-size:11px;color:var(--gray);}
.stars{color:#FFCB05;font-size:14px;margin-bottom:6px;letter-spacing:1px;}
.review-text{font-size:13px;color:var(--gray);line-height:1.6;}
.review-branch{display:inline-block;margin-top:8px;background:var(--orange-light);color:var(--orange-dark);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px;max-width:520px;width:90%;padding:28px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;margin-bottom:20px;}
.modal-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;}
.modal-row .label{color:var(--gray);}
.modal-row .val{font-weight:600;}
.modal-items{margin:14px 0;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.modal-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.modal-item:last-child{border-bottom:none;}
.modal-close{width:100%;margin-top:18px;padding:12px;background:var(--gray-light);border:none;border-radius:12px;font-family:"DM Sans",sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;}
.modal-close:hover{background:var(--black);color:white;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:500;transform:translateY(80px);opacity:0;transition:all 0.3s;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.green{background:var(--green);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;}
.empty-state p{font-size:15px;}

/* ── BTN ── */
.btn-sm{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.2s;font-family:"DM Sans",sans-serif;}
.btn-orange-sm{background:var(--orange);border-color:var(--orange);color:white;}
.btn-orange-sm:hover{background:var(--orange-dark);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.kpi{animation:fadeUp 0.35s ease both;}
.kpi:nth-child(1){animation-delay:0s;}
.kpi:nth-child(2){animation-delay:0.05s;}
.kpi:nth-child(3){animation-delay:0.1s;}
.kpi:nth-child(4){animation-delay:0.15s;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .content{padding:16px;}
}
</style>
</head>

// ═══════════════════════════════════════════════
//  MOCK DATA
// ═══════════════════════════════════════════════
const BRANCHES = ["Kiyovu","Remera","Kimironko","Nyamirambo","Gisozi","Kanombe"];
const SLOTS = ["08:00–09:00","09:00–10:00","10:00–11:00","11:00–12:00","13:00–14:00","14:00–15:00","15:00–16:00","16:00–17:00"];
const NAMES = ["Kalisa Jean","Uwimana Marie","Habimana Eric","Mukamana Diane","Nzeyimana Patrick","Ingabire Alice","Ndayishimiye Fred","Uwineza Grace","Bizimana Louis","Uwase Sandrine"];
const CATS = ["Food Products","Alcoholic Drinks","Cosmetics & Personal Care","Cleaning & Sanitary","Kitchenware & Electronics","Baby Products","Sports & Fitness","Stationery","General"];

let ordersData = [], inventoryData = [], reviewsData = [];
let orderFilter = "all", selBranch = "all";
let lang = localStorage.getItem("simba_lang") || "en";
let currentPage = "overview";

// Seed deterministic fake data
function seedData(){
  const statuses = ["pending","pending","pending","confirmed","confirmed","ready","picked","cancelled"];
  for(let i=0;i<48;i++){
    const branch = BRANCHES[i%BRANCHES.length];
    const status = statuses[i%statuses.length];
    const items = Math.ceil(Math.random()*4)+1;
    const total = Math.round((Math.random()*50000+5000)/100)*100;
    const hoursAgo = Math.floor(Math.random()*20);
    ordersData.push({
      id:"SB-"+Math.random().toString(36).slice(2,8).toUpperCase(),
      customer:NAMES[i%NAMES.length],
      phone:"07"+(Math.random()>0.5?"2":"8")+Math.floor(Math.random()*9e7+1e7),
      branch,
      slot:SLOTS[i%SLOTS.length],
      total,
      deposit:Math.round(total*0.5),
      status,
      items,
      notes: i%5===0 ? "Please pack carefully" : "",
      time: new Date(Date.now()-hoursAgo*3600000)
    });
  }
  // Inventory from simba_products.json or fallback
  const SAMPLE_PRODUCTS = [
    {id:1,name:"Skol Beer 500ml",category:"Alcoholic Drinks",price:1500,inStock:true},
    {id:2,name:"Nestle Lactogen 400g",category:"Baby Products",price:8000,inStock:true},
    {id:3,name:"Dove Soap 100g",category:"Cosmetics & Personal Care",price:2200,inStock:false},
    {id:4,name:"Ariel Washing Powder 2kg",category:"Cleaning & Sanitary",price:4500,inStock:true},
    {id:5,name:"Honey Pure Rwandan 500g",category:"Food Products",price:12000,inStock:true},
    {id:6,name:"Photocopy Paper A4 Ream",category:"Stationery",price:7500,inStock:false},
    {id:7,name:"Electric Kettle 1.5L",category:"Kitchenware & Electronics",price:18000,inStock:true},
    {id:8,name:"Primus Beer 330ml",category:"Alcoholic Drinks",price:900,inStock:true},
    {id:9,name:"Johnsons Baby Lotion",category:"Baby Products",price:3500,inStock:true},
    {id:10,name:"Head & Shoulders Shampoo",category:"Cosmetics & Personal Care",price:4200,inStock:false},
    {id:11,name:"Scotch Tape 18mm",category:"Stationery",price:800,inStock:true},
    {id:12,name:"Extension Socket 4-way",category:"Kitchenware & Electronics",price:6000,inStock:true},
    {id:13,name:"Dettol Disinfectant 500ml",category:"Cleaning & Sanitary",price:3200,inStock:true},
    {id:14,name:"Corned Beef 340g",category:"Food Products",price:5400,inStock:false},
    {id:15,name:"Massage Roller Pro",category:"Sports & Fitness",price:15000,inStock:true},
    {id:16,name:"Water Bottle 1.5L",category:"General",price:600,inStock:true},
  ];
  inventoryData = SAMPLE_PRODUCTS.map(p=>({...p, branchStock:{
    Kiyovu:p.inStock, Remera:p.inStock, Kimironko:!p.inStock,
    Nyamirambo:p.inStock, Gisozi:false, Kanombe:p.inStock
  }}));
  // Reviews
  const COMMENTS = [
    {en:"Fresh products, fast pick-up. Very happy with the service!",fr:"Produits frais, retrait rapide. Très satisfait du service !",rw:"Ibicuruzwa bishya, gutwara vite. Nishimye cyane!"},
    {en:"Good selection but some items were out of stock.",fr:"Bon choix mais certains articles étaient en rupture.",rw:"Urutonde rwiza ariko ibintu bimwe ntibyahari."},
    {en:"MTN MoMo payment was smooth and easy.",fr:"Le paiement MTN MoMo était fluide et facile.",rw:"Kwishyura kwa MTN MoMo byagenze neza cyane."},
    {en:"Prices are fair. I loved the Kinyarwanda option!",fr:"Les prix sont raisonnables. J'ai adoré l'option en kinyarwanda !",rw:"Ibiciro ni byiza. Nashimye gukoresha Ikinyarwanda!"},
    {en:"Branch was clean and staff were very helpful.",fr:"La succursale était propre et le personnel très serviable.",rw:"Ishami ryari ritunganye kandi abakozi bari bafasha cyane."},
    {en:"Delivery was ready before my slot. Excellent!",fr:"La commande était prête avant mon créneau. Excellent !",rw:"Itumba ryari riteguye mbere y'igihe cyanjye. Byiza cyane!"},
  ];
  const RATINGS=[5,4,5,4,3,5,4,5,3,4];
  for(let i=0;i<20;i++){
    const c=COMMENTS[i%COMMENTS.length];
    reviewsData.push({
      name:NAMES[i%NAMES.length],
      rating:RATINGS[i%RATINGS.length],
      branch:BRANCHES[i%BRANCHES.length],
      comment:c,
      time:new Date(Date.now()-(i*18+Math.random()*10)*3600000)
    });

}

// ═══════════════════════════════════════════════
//  LANG
// ═══════════════════════════════════════════════
function tr(k){return (T[lang]||T.en)[k]||k;}
function setLang(l){
  lang=l;localStorage.setItem("simba_lang",l);
  applyLang();setActiveLangBtn();renderAll();
}
function setActiveLangBtn(){
  ["en","fr","rw"].forEach(l=>{
    document.getElementById("btn-"+l).classList.toggle("active",l===lang);
  });
}
function applyLang(){
  document.querySelectorAll("[data-t]").forEach(el=>{
    const k=el.getAttribute("data-t");el.textContent=tr(k);
  });
}

// ═══════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════
function showPage(p){
  currentPage=p;
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  document.querySelectorAll(".sb-link").forEach(el=>el.classList.remove("active"));
  event.currentTarget.classList.add("active");
  document.getElementById("topbar-title").textContent=tr("nav_"+p);
  renderAll();
}

// ═══════════════════════════════════════════════
//  KPI
// ═══════════════════════════════════════════════
function renderKPI(){
  const filtered = filteredOrders();
  const today = filtered.filter(o=>isToday(o.time));
  const pending = filtered.filter(o=>o.status==="pending").length;
  const ready   = filtered.filter(o=>o.status==="ready").length;
  const revenue = today.reduce((s,o)=>s+o.total,0);
  const kpis=[
    {icon:"🧾",value:today.length,label:tr("kpi_orders_today"),delta:"+4 vs yesterday",up:true},
    {icon:"💰",value:fmt(revenue),label:tr("kpi_revenue"),delta:"RWF today",up:true},
    {icon:"⏳",value:pending,label:tr("kpi_pending"),delta:pending>5?"High volume":"Normal",up:pending<=5},
    {icon:"✅",value:ready,label:tr("kpi_ready"),delta:"awaiting pick-up",up:true},
  ];
  document.getElementById("kpi-grid").innerHTML=kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-delta ${k.up?"up":"down"}">${k.delta}</div>
    </div>`).join("");
  // Sidebar badges
  document.getElementById("sb-orders-badge").textContent=pending;
  document.getElementById("sb-reviews-badge").textContent=reviewsData.length;
}

function isToday(d){
  const t=new Date();
  return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth();
}
function fmt(n){return typeof n==="number"?Math.round(n).toLocaleString()+" RWF":n;}

// ═══════════════════════════════════════════════
//  ORDERS
// ═══════════════════════════════════════════════
function filteredOrders(){
  let data = selBranch==="all" ? ordersData : ordersData.filter(o=>o.branch.toLowerCase()===selBranch);
  return data;
}

function renderOverviewTable(){
  const data = filteredOrders().slice(0,8);
  const wrap = document.getElementById("overview-table");
  wrap.innerHTML = ordersTableHTML(data, true);
}

function filterOrders(f, btn){
  orderFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderOrdersTable();
}

function renderOrdersTable(){
  let data = filteredOrders();
  const q = (document.getElementById("order-search")||{}).value||"";
  if(orderFilter!=="all") data=data.filter(o=>o.status===orderFilter);
  if(q) data=data.filter(o=>
    o.id.toLowerCase().includes(q.toLowerCase())||
    o.customer.toLowerCase().includes(q.toLowerCase())||
    o.phone.includes(q)
  );
  document.getElementById("orders-table-wrap").innerHTML=ordersTableHTML(data,false);
}

function ordersTableHTML(data, compact){
  if(!data.length) return `<div class="empty-state"><div class="empty-icon">📭</div><p>No orders found</p></div>`;
  const statusBadge=(s)=>{
    const map={pending:"badge-pending",confirmed:"badge-confirmed",ready:"badge-ready",picked:"badge-picked",cancelled:"badge-cancelled"};
    return `<span class="badge ${map[s]||""}">● ${tr("status_"+s)}</span>`;
  };
  const actions=(o)=>{
    if(o.status==="pending")    return `<button class="act-btn act-confirm" onclick="changeStatus('${o.id}','confirmed')">${tr("btn_confirm")}</button> <button class="act-btn act-cancel" onclick="changeStatus('${o.id}','cancelled')">${tr("btn_cancel")}</button>`;
    if(o.status==="confirmed")  return `<button class="act-btn act-ready" onclick="changeStatus('${o.id}','ready')">${tr("btn_ready")}</button>`;
    if(o.status==="ready")      return `<span style="color:var(--green);font-size:12px;font-weight:700;">🟢 Ready</span>`;
    return "";
  };
  return `<div style="overflow-x:auto;">
  <table>
    <thead><tr>
      <th>${tr("col_ref")}</th>
      <th>${tr("col_customer")}</th>
      ${!compact?`<th>${tr("col_branch")}</th>`:``}
      <th>${tr("col_slot")}</th>
      <th>${tr("col_total")}</th>
      <th>${tr("col_deposit")}</th>
      <th>${tr("col_status")}</th>
      <th>${tr("col_actions")}</th>
    </tr></thead>
    <tbody>
      ${data.map(o=>`<tr>
        <td><span class="order-ref">${o.id}</span></td>
        <td>
          <div class="order-customer">${o.customer}</div>
          <div class="order-phone">${o.phone}</div>
        </td>
        ${!compact?`<td>${o.branch}</td>`:``}
        <td style="font-size:12px;color:var(--gray);">${o.slot}</td>
        <td style="font-weight:600;">${fmt(o.total)}</td>
        <td style="color:var(--orange);font-weight:600;">${fmt(o.deposit)}</td>
        <td>${statusBadge(o.status)}</td>
        <td>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
            <button class="act-btn act-view" onclick="viewOrder('${o.id}')">${tr("btn_view")}</button>
            ${actions(o)}
          </div>
        </td>
      </tr>`).join("")}
    </tbody>
  </table></div>`;
}

function changeStatus(id, newStatus){
  const o = ordersData.find(x=>x.id===id);
  if(!o) return;
  o.status = newStatus;
  const msgs = {confirmed:tr("toast_confirmed"), ready:tr("toast_ready"), cancelled:tr("toast_cancelled")};
  showToast(msgs[newStatus]||"Updated", newStatus==="cancelled"?"":"green");
  renderAll();
}

function viewOrder(id){
  const o=ordersData.find(x=>x.id===id);
  if(!o) return;
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-row"><span class="label">${tr("col_ref")}</span><span class="val">${o.id}</span></div>
    <div class="modal-row"><span class="label">${tr("col_customer")}</span><span class="val">${o.customer}</span></div>
    <div class="modal-row"><span class="label">${tr("col_branch")}</span><span class="val">${o.branch}</span></div>
    <div class="modal-row"><span class="label">${tr("col_slot")}</span><span class="val">${o.slot}</span></div>
    <div class="modal-row"><span class="label">${tr("col_total")}</span><span class="val">${fmt(o.total)}</span></div>
    <div class="modal-row"><span class="label">${tr("col_deposit")}</span><span class="val" style="color:var(--orange);">${fmt(o.deposit)} paid</span></div>
    <div class="modal-row"><span class="label">Balance due</span><span class="val">${fmt(o.total-o.deposit)}</span></div>
    ${o.notes?`<div class="modal-row"><span class="label">${tr("order_notes")}</span><span class="val">${o.notes}</span></div>`:""}
    <div style="font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--gray);text-transform:uppercase;margin-top:14px;margin-bottom:8px;">${tr("order_items")}</div>
    <div class="modal-items">
      ${Array.from({length:o.items},(_,i)=>`
        <div class="modal-item">
          <span>Product ${i+1}</span>
          <span style="color:var(--gray);">× ${Math.ceil(Math.random()*3)}</span>
          <span style="font-weight:600;">${fmt(Math.round(o.total/o.items/100)*100)}</span>
        </div>`).join("")}
    </div>`;
  document.getElementById("order-modal").classList.add("open");
}
function closeModal(){ document.getElementById("order-modal").classList.remove("open"); }

// ═══════════════════════════════════════════════
//  INVENTORY
// ═══════════════════════════════════════════════
function renderInventory(){
  const branch = selBranch==="all" ? "Kiyovu" : selBranch.charAt(0).toUpperCase()+selBranch.slice(1);
  const q = (document.getElementById("inv-search")||{}).value||"";
  const cat = (document.getElementById("inv-cat")||{}).value||"";
  const oosOnly = (document.getElementById("inv-oos-only")||{}).checked||false;

  // populate cat filter
  const catSel = document.getElementById("inv-cat");
  if(catSel && catSel.options.length<=1){
    CATS.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o);});
  }

  let data = inventoryData.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(cat && p.category!==cat) return false;
    const inStock = selBranch==="all" ? p.inStock : (p.branchStock[branch]??p.inStock);
    if(oosOnly && inStock) return false;
    return true;
  });

  document.getElementById("inv-subtitle").textContent = data.length+" "+tr("items")+" · "+tr("inv_subtitle").split("·")[1];

  document.getElementById("inv-grid").innerHTML = data.map(p=>{
    const inStock = selBranch==="all" ? p.inStock : (p.branchStock[branch]??p.inStock);
    const checked = inStock?"checked":"";
    return `<div class="inv-card">
      <div class="inv-img"><span style="font-size:28px;">${catEmoji(p.category)}</span></div>
      <div class="inv-info">
        <div class="inv-name" title="${p.name}">${p.name}</div>
        <div class="inv-cat">${p.category}</div>
        <div class="inv-price">${fmt(p.price)}</div>
        <div class="inv-stock">
          <div class="stock-dot ${inStock?"in":"out"}"></div>
          <span class="stock-label" style="color:${inStock?"var(--green)":"var(--red)"};">${tr(inStock?"in_stock":"out_of_stock")}</span>
          <label class="stock-toggle">
            <input type="checkbox" ${checked} onchange="toggleStock(${p.id},'${branch}',this.checked)">
            <div class="slider"></div>
          </label>
        </div>
      </div>
    </div>`;
  }).join("")||`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📦</div><p>No products found</p></div>`;
}

function catEmoji(c){
  const map={"Food Products":"🍯","Alcoholic Drinks":"🍷","Cosmetics & Personal Care":"💄",
    "Cleaning & Sanitary":"🧹","Kitchenware & Electronics":"⚡","Baby Products":"👶",
    "Sports & Fitness":"💪","Stationery":"✏️","General":"📦"};
  return map[c]||"🛍";
}

function toggleStock(id, branch, val){
  const p=inventoryData.find(x=>x.id===id);
  if(!p) return;
  p.branchStock[branch]=val;
  p.inStock=val;
  showToast(val?tr("in_stock")+" ✓":tr("out_of_stock")+" updated", val?"green":"");
}

// ═══════════════════════════════════════════════
//  REVIEWS
// ═══════════════════════════════════════════════
function renderReviews(){
  const data = selBranch==="all" ? reviewsData : reviewsData.filter(r=>r.branch.toLowerCase()===selBranch);
  const avg = data.length ? (data.reduce((s,r)=>s+r.rating,0)/data.length).toFixed(1) : "–";
  const stars = n => "★".repeat(Math.round(n))+"☆".repeat(5-Math.round(n));

  document.getElementById("rating-summary").innerHTML=`
    <div style="text-align:center;">
      <div style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--orange);">${avg}</div>
      <div style="font-size:22px;color:#FFCB05;letter-spacing:2px;">${stars(avg)}</div>
      <div style="font-size:13px;color:var(--gray);margin-top:4px;">${tr("rating_avg")}</div>
    </div>
    <div style="width:1px;background:var(--border);height:80px;"></div>
    <div style="text-align:center;">
      <div style="font-family:'Syne',sans-serif;font-size:40px;font-weight:800;">${data.length}</div>
      <div style="font-size:13px;color:var(--gray);margin-top:4px;">${tr("rating_total")}</div>
    </div>
    <div style="flex:1;">
      ${[5,4,3,2,1].map(s=>{
        const cnt=data.filter(r=>r.rating===s).length;
        const pct=data.length?Math.round(cnt/data.length*100):0;
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">
          <span style="font-size:12px;color:var(--gray);width:16px;">${s}</span>
          <span style="font-size:12px;color:#FFCB05;">★</span>
          <div style="flex:1;height:8px;background:var(--gray-light);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:#FFCB05;border-radius:4px;"></div>
          </div>
          <span style="font-size:12px;color:var(--gray);width:24px;">${cnt}</span>
        </div>`;
      }).join("")}
    </div>`;

  document.getElementById("reviews-grid").innerHTML=data.map(r=>`
    <div class="review-card">
      <div class="review-header">
        <div class="review-avatar">${r.name[0]}</div>
        <div class="review-meta">
          <div class="review-name">${r.name}</div>
          <div class="review-time">${timeAgo(r.time)}</div>
        </div>
      </div>
      <div class="stars">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</div>
      <div class="review-text">${r.comment[lang]||r.comment.en}</div>
      <div class="review-branch">📍 ${r.branch}</div>
    </div>`).join("")||`<div class="empty-state"><div class="empty-icon">⭐</div><p>No reviews yet</p></div>`;
}

function timeAgo(d){
  const mins=Math.floor((Date.now()-d)/60000);
  if(mins<60) return mins+"m ago";
  const hrs=Math.floor(mins/60);
  if(hrs<24) return hrs+"h ago";
  return Math.floor(hrs/24)+"d ago";
}

// ═══════════════════════════════════════════════
//  BRANCH FILTER
// ═══════════════════════════════════════════════
function onBranchChange(){
  selBranch = document.getElementById("branch-select").value;
  renderAll();
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function showToast(msg, type=""){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(type?" "+type:"");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ═══════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════
function renderAll(){
  applyLang();
  renderKPI();
  if(currentPage==="overview"||currentPage==="orders") renderOverviewTable();
  if(currentPage==="orders") renderOrdersTable();
  if(currentPage==="inventory") renderInventory();
  if(currentPage==="reviews") renderReviews();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
seedData();
setActiveLangBtn();
renderAll();
renderInventory();

// Click outside modal to close
document.getElementById("order-modal").addEventListener("click",function(e){
  if(e.target===this) closeModal();
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shop — Simba 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#E8620A;--orange-dark:#c04f06;--orange-light:#fff3eb;
  --black:#0e0c0a;--white:#fffcf8;--gray:#6b6560;--gray-light:#f5f2ee;
  --green:#0a6e3f;--border:rgba(0,0,0,0.08);
}
html{scroll-behavior:smooth;}
body{font-family:"DM Sans",sans-serif;background:var(--white);color:var(--black);min-height:100vh;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,252,248,0.96);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(232,98,10,0.12);
  padding:0 3%;display:flex;align-items:center;gap:10px;height:62px;
}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.nav-logo-icon{width:34px;height:34px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;color:#fff;font-size:16px;}
.nav-logo-text{font-family:"Syne",sans-serif;font-weight:700;font-size:16px;color:var(--black);}
.nav-logo-text span{color:var(--orange);}
.search-wrap{flex:1;max-width:560px;position:relative;}
.search-input{
  width:100%;padding:9px 42px 9px 14px;
  border:1.5px solid rgba(232,98,10,0.22);border-radius:11px;
  font-family:"DM Sans",sans-serif;font-size:14px;
  background:#fff;outline:none;transition:all 0.2s;color:var(--black);
}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,98,10,0.08);}
.search-input::placeholder{color:#b0aca8;}
.search-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:var(--orange);border:none;border-radius:8px;
  width:30px;height:30px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all 0.2s;
}
.search-btn:hover{background:var(--orange-dark);}
.search-btn.loading{background:#f59e0b;}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg);}}
.search-btn.loading{animation:spin 0.8s linear infinite;}
.nav-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.lang-grp{display:flex;gap:2px;}
.lbtn{
  background:none;border:1.5px solid transparent;border-radius:14px;
  padding:3px 8px;font-size:11px;font-weight:600;color:var(--gray);
  cursor:pointer;transition:all 0.15s;font-family:"DM Sans",sans-serif;
}
.lbtn.active{border-color:var(--orange);color:var(--orange);}
.dark-btn{
  background:none;border:1.5px solid var(--border);border-radius:9px;
  width:32px;height:32px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.dark-btn:hover{border-color:var(--orange);}
.cart-btn{
  position:relative;background:var(--orange);border:none;border-radius:9px;
  padding:7px 13px;color:#fff;font-family:"DM Sans",sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all 0.2s;
}
.cart-btn:hover{background:var(--orange-dark);}
.cart-badge{
  position:absolute;top:-6px;right:-6px;background:var(--black);color:#fff;
  border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;
  display:none;align-items:center;justify-content:center;
}

/* ── AI REPLY ── */
.ai-bar{
  margin:10px 3% 0;padding:12px 16px;
  background:linear-gradient(135deg,rgba(232,98,10,0.06),rgba(232,98,10,0.02));
  border:1px solid rgba(232,98,10,0.15);border-radius:12px;
  display:none;align-items:flex-start;gap:10px;
}
.ai-bar.show{display:flex;}
.ai-face{
  width:30px;height:30px;background:var(--orange);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}
.ai-text{font-size:13px;color:var(--black);line-height:1.6;}
.ai-text strong{color:var(--orange);}
.ai-clear{
  margin-left:auto;flex-shrink:0;background:none;border:1px solid rgba(232,98,10,0.3);
  border-radius:8px;padding:3px 10px;font-size:11px;color:var(--orange);
  cursor:pointer;font-weight:600;white-space:nowrap;
}

/* ── PAGE LAYOUT ── */
.page{display:flex;min-height:calc(100vh - 62px);}

/* ── SIDEBAR ── */
.sidebar{
  width:210px;flex-shrink:0;padding:16px 14px;
  border-right:1px solid var(--border);
  position:sticky;top:62px;height:calc(100vh - 62px);
  overflow-y:auto;background:#fff;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(232,98,10,0.2);border-radius:4px;}
.sb-title{
  font-family:"Syne",sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);
  margin-bottom:8px;margin-top:4px;
}
.cat-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 9px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--gray);
  transition:all 0.15s;border:none;background:none;
  width:100%;text-align:left;font-family:"DM Sans",sans-serif;
  margin-bottom:1px;
}
.cat-btn:hover{background:var(--orange-light);color:var(--orange);}
.cat-btn.active{background:var(--orange);color:#fff;}
.cat-emoji{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.cat-count-pill{
  margin-left:auto;font-size:10px;font-weight:600;
  background:rgba(0,0,0,0.06);border-radius:10px;padding:1px 6px;
}
.cat-btn.active .cat-count-pill{background:rgba(255,255,255,0.25);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.filter-block{margin-bottom:14px;}
.filter-label{font-size:11px;font-weight:600;color:var(--gray);margin-bottom:6px;display:block;}
input[type=range]{width:100%;accent-color:var(--orange);cursor:pointer;}
.price-display{font-size:12px;font-weight:700;color:var(--orange);margin-top:4px;}

/* ── MAIN ── */
.main{flex:1;padding:16px 18px;min-width:0;}
.sort-select{
  width:100%;padding:7px 9px;border:1.5px solid var(--border);
  border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;
  background:#fff;color:var(--black);outline:none;cursor:pointer;
}
.sort-select:focus{border-color:var(--orange);}
.mobile-chips{display:none;gap:7px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
.mobile-chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:6px 13px;border-radius:18px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all 0.15s;font-family:"DM Sans",sans-serif;white-space:nowrap;
}
.chip.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.mobile-bar{display:none;gap:8px;margin-bottom:12px;align-items:center;}
.results-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.results-txt{font-size:13px;color:var(--gray);}
.results-txt strong{color:var(--black);font-weight:700;}

/* ── PRODUCT GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}

/* ── PRODUCT CARD ── */
.card{
  background:#fff;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.2s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(232,98,10,0.13);}
.card-img{
  height:148px;background:var(--gray-light);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.card-img img{
  max-height:100%;max-width:100%;
  object-fit:contain;padding:10px;
  transition:transform 0.3s;
}
.card:hover .card-img img{transform:scale(1.04);}
.card-oos-overlay{
  position:absolute;inset:0;background:rgba(255,255,255,0.78);
  display:flex;align-items:center;justify-content:center;
}
.oos-pill{
  font-size:11px;font-weight:600;color:#ef4444;
  border:1px solid #fca5a5;border-radius:18px;padding:3px 10px;background:#fff;
}
.card-badges{position:absolute;top:7px;left:7px;display:flex;gap:3px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:7px;color:#fff;}
.badge-new{background:#10b981;}
.badge-hot{background:#ef4444;}
.card-qty-dot{
  position:absolute;top:7px;right:7px;
  background:var(--orange);color:#fff;
  font-size:10px;font-weight:700;width:20px;height:20px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.card-body{padding:9px 11px;flex:1;display:flex;flex-direction:column;gap:2px;}
.card-category{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--orange);}
.card-name{
  font-size:12px;font-weight:600;line-height:1.4;color:var(--black);flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-unit{font-size:10px;color:var(--gray);}
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;border-top:1px solid var(--gray-light);
}
.card-price{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;color:var(--orange);}
.card-price small{font-size:9px;font-weight:400;color:var(--gray);}
.add-btn{
  background:var(--orange);color:#fff;border:none;
  border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;
  cursor:pointer;transition:all 0.18s;font-family:"DM Sans",sans-serif;
}
.add-btn:hover:not(:disabled){background:var(--orange-dark);}
.add-btn.added{background:#10b981;}
.add-btn:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}

/* ── TOGGLE ── */
.toggle-wrap{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle-wrap input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#ddd;border-radius:20px;transition:0.25s;}
.toggle-wrap input:checked+.toggle-track{background:var(--orange);}
.toggle-track::before{
  content:"";position:absolute;width:14px;height:14px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.25s;
}
.toggle-wrap input:checked+.toggle-track::before{transform:translateX(16px);}

/* ── EMPTY ── */
.empty{text-align:center;padding:70px 20px;}
.empty-icon{font-size:52px;margin-bottom:16px;}
.empty h3{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;}
.empty p{font-size:14px;color:var(--gray);margin-bottom:20px;}
.empty-btn{
  background:var(--orange);color:#fff;border:none;
  padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:"DM Sans",sans-serif;
}

/* ── PRODUCT MODAL ── */
.modal-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:200;display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-wrap.open{display:flex;}
.modal{
  background:#fff;border-radius:18px;width:100%;max-width:460px;
  overflow:hidden;position:relative;max-height:90vh;overflow-y:auto;
}
.modal-hero{
  height:210px;background:var(--gray-light);
  display:flex;align-items:center;justify-content:center;
}
.modal-hero img{max-height:100%;max-width:100%;object-fit:contain;padding:16px;}
.modal-x{
  position:absolute;top:11px;right:11px;background:#fff;border:none;
  border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:18px 22px;}
.modal-cat-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;}
.modal-name{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;line-height:1.25;margin-bottom:6px;}
.modal-meta{font-size:12px;color:var(--gray);margin-bottom:12px;}
.stock-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;padding:4px 11px;border-radius:18px;margin-bottom:14px;
}
.stock-chip.in{background:#e6f5ee;color:var(--green);}
.stock-chip.out{background:#fee2e2;color:#dc2626;}
.modal-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;border-top:1px solid var(--gray-light);
}
.modal-price{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;color:var(--orange);}
.modal-price small{font-size:12px;font-weight:400;color:var(--gray);}
.modal-add{
  background:var(--orange);color:#fff;border:none;
  padding:11px 22px;border-radius:11px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all 0.2s;font-family:"DM Sans",sans-serif;
}
.modal-add:hover{background:var(--orange-dark);}
.modal-add.added{background:#10b981;}
.modal-add:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}

/* ── CART DRAWER ── */
.drawer-wrap{position:fixed;inset:0;z-index:300;display:none;}
.drawer-wrap.open{display:block;}
.drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.38);backdrop-filter:blur(3px);}
.drawer{
  position:absolute;right:0;top:0;bottom:0;
  width:100%;max-width:390px;background:#fff;
  display:flex;flex-direction:column;
  animation:drawerIn 0.28s cubic-bezier(.4,0,.2,1);
}
@keyframes drawerIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--gray-light);
}
.drawer-head h2{font-family:"Syne",sans-serif;font-size:17px;font-weight:700;}
.drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);}
.drawer-body{flex:1;overflow-y:auto;padding:14px;}
.ci{
  display:flex;gap:11px;background:var(--gray-light);
  border-radius:11px;padding:11px;margin-bottom:9px;
}
.ci-img{
  width:50px;height:50px;border-radius:8px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.ci-img img{max-width:100%;max-height:100%;object-fit:contain;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.ci-price{font-size:11px;color:var(--gray);}
.ci-row{display:flex;align-items:center;gap:7px;margin-top:7px;}
.qbtn{
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);
  background:#fff;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.qbtn:hover{border-color:var(--orange);color:var(--orange);}
.qval{font-size:13px;font-weight:700;width:18px;text-align:center;}
.ci-sub{font-size:12px;font-weight:700;color:var(--orange);margin-left:2px;}
.ci-rm{margin-left:auto;font-size:11px;color:#ef4444;background:none;border:none;cursor:pointer;font-weight:500;}
.drawer-foot{padding:14px 18px;border-top:1px solid var(--gray-light);}
.tot-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.tot-row.final{
  font-family:"Syne",sans-serif;font-size:17px;font-weight:700;
  border-top:1px solid var(--gray-light);padding-top:9px;margin-top:5px;
}
.tot-row.final span:last-child{color:var(--orange);}
.checkout-btn{
  display:block;width:100%;background:var(--orange);color:#fff;border:none;
  padding:13px;border-radius:11px;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:12px;font-family:"DM Sans",sans-serif;
  text-align:center;text-decoration:none;transition:all 0.2s;
}
.checkout-btn:hover{background:var(--orange-dark);}
.cart-empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:40px;text-align:center;
}
.cart-empty-state .icon{font-size:46px;margin-bottom:12px;}
.cart-empty-state p{font-size:14px;color:var(--gray);margin-bottom:16px;}
.cart-empty-state button{
  background:var(--orange);color:#fff;border:none;
  padding:9px 22px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;
}

/* ── DARK MODE ── */
body.dark{background:#111;color:#eee;}
body.dark nav,body.dark .sidebar,body.dark .modal,body.dark .drawer{background:#1a1a1a;}
body.dark nav{background:rgba(26,26,26,0.97);}
body.dark .sidebar{border-color:#2a2a2a;}
body.dark .sort-select{background:#242424;color:#eee;border-color:#333;}
body.dark nav{background:rgba(26,26,26,0.97);}
body.dark .card{background:#1e1e1e;border-color:#2a2a2a;}
body.dark .card-foot{border-color:#2a2a2a;}
body.dark .search-input{background:#242424;color:#eee;border-color:#333;}
body.dark .sort-select{background:#242424;color:#eee;border-color:#333;}
body.dark .chip{background:#1e1e1e;border-color:#333;color:#ccc;}
body.dark .card-img,.body.dark .modal-hero{background:#242424;}
body.dark .ci{background:#242424;}
body.dark .sidebar{border-color:#2a2a2a;}

/* ── RESPONSIVE ── */
@media(max-width:820px){
  .sidebar{display:none;}
  .mobile-chips{display:flex;}
  .mobile-bar{display:flex;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
  .lang-grp{display:none;}
}
@media(max-width:480px){
  nav{padding:0 3%;}
  .main{padding:12px 10px;}
  .grid{grid-template-columns:repeat(2,1fr);gap:9px;}
  .card-img{height:130px;}
}

/* ── LOGO IMAGE ── */
.nav-logo-img{
  width:38px;height:38px;border-radius:50%;object-fit:cover;
  border:2px solid var(--orange);flex-shrink:0;
}

/* ── SHOP HERO CAROUSEL ── */
.shop-hero{
  position:relative;overflow:hidden;height:340px;
  background:var(--black);
}
.hero-slides{
  display:flex;height:100%;
  transition:transform 0.65s cubic-bezier(.77,0,.18,1);
  will-change:transform;
}
.hero-slide{
  min-width:100%;height:100%;position:relative;flex-shrink:0;
}
.hero-slide-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform 6s ease;
}
.hero-slide.active .hero-slide-img{transform:scale(1.06);}
.hero-slide-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(14,12,10,0.78) 0%,rgba(14,12,10,0.35) 55%,rgba(232,98,10,0.25) 100%);
}
.hero-slide-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 4%;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.hero-slide-label{
  font-family:"Syne",sans-serif;font-size:11px;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);
  margin-bottom:6px;
}
.hero-slide-title{
  font-family:"Syne",sans-serif;font-size:30px;font-weight:800;
  color:#fff;line-height:1.1;margin-bottom:6px;
}
.hero-slide-sub{
  font-size:13px;color:rgba(255,255,255,0.7);
}
.hero-shop-btn{
  background:var(--orange);color:#fff;border:none;
  padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:"DM Sans",sans-serif;
  white-space:nowrap;flex-shrink:0;transition:all 0.2s;
  margin-left:20px;
}
.hero-shop-btn:hover{background:var(--orange-dark);transform:translateY(-1px);}
/* dots */
.hero-dots{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:10;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.3s;border:none;
}
.hero-dot.active{background:#fff;width:20px;border-radius:3px;}
/* arrows */
.hero-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.12);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.18);border-radius:50%;
  width:38px;height:38px;color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:10;transition:all 0.2s;
}
.hero-arrow:hover{background:rgba(232,98,10,0.7);}
.hero-arrow.prev{left:14px;}
.hero-arrow.next{right:14px;}

/* ── CATEGORY TABS HORIZONTAL ── */
.cat-tabs{
  background:#fff;border-bottom:1px solid var(--border);
  padding:0 3%;display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;align-items:center;height:52px;
}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12px;font-weight:500;color:var(--gray);
  cursor:pointer;transition:all 0.15s;
  font-family:"DM Sans",sans-serif;white-space:nowrap;
}
.cat-tab.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.cat-tab:hover:not(.active){background:var(--orange-light);border-color:var(--orange);color:var(--orange);}
.cat-tab-emoji{font-size:14px;}

/* Dark mode extras */
body.dark .hero-arrow{background:rgba(0,0,0,0.4);}
body.dark .cat-tabs{background:#1a1a1a;border-color:#2a2a2a;}
body.dark .cat-tab{background:#1e1e1e;border-color:#333;color:#ccc;}
</style>

function applyTranslations(){
  document.querySelectorAll("[data-t]").forEach(el=>{
    const v = tr(el.dataset.t);

  });

}

function setLang(l){
  lang = l;
  localStorage.setItem("simba_lang",l);
  document.querySelectorAll(".lbtn").forEach(b=>b.classList.toggle("active",b.textContent.trim()===l.toUpperCase()));

//  CATEGORIES
// ═══════════════════════════════════════════════════
function catCount(cat){ return cat==="All" ? PRODUCTS.length : PRODUCTS.filter(p=>p.category===cat).length; }

function buildCats(){
  const chips = document.getElementById("mobileChips");
  const tabs  = document.getElementById("catTabs");
  chips.innerHTML = "";
  if(tabs) tabs.innerHTML = "";
  const labels = CAT_LABELS[lang]||CAT_LABELS.en;
  CATS.forEach(cat=>{
    const icon  = CAT_ICONS[cat]||"📦";
    const label = labels[cat]||cat;
    const cnt   = catCount(cat);
    const act   = cat===selCat;
    // chip
    const c = document.createElement("button");
    c.className = "chip"+(act?" active":"");
    c.textContent = icon+" "+label;
    c.onclick   = ()=>pickCat(cat);
    chips.appendChild(c);
    // horizontal cat tab
    if(tabs){
      const t = document.createElement("button");
      t.className = "cat-tab"+(act?" active":"");
      t.innerHTML = `<span class="cat-tab-emoji">${icon}</span>${label}`;
      t.onclick   = ()=>pickCat(cat);
      tabs.appendChild(t);
    }
  });
}

function pickCat(cat){
  selCat=cat; aiIDs=null; searchTerm="";
  document.getElementById("searchInput").value="";
  document.getElementById("aiBar").classList.remove("show");
  // Update price slider max to match category
  updateCatPriceRange();
  buildCats(); applyFilters();
  // Sync hero
  heroFocusCat(cat);
}

function updateCatPriceRange(){
  const prods = selCat==="All" ? PRODUCTS : PRODUCTS.filter(p=>p.category===selCat);
  const catMax = prods.length ? Math.max(...prods.map(p=>p.price)) : MAX_PRICE;
  const slider = document.getElementById("priceSlider");
  // Only reset value if current value exceeds new max
  slider.max = catMax;
  if(Number(slider.value) > catMax) slider.value = catMax;
  maxPrice = Number(slider.value);
  updatePriceLabel();
}

// ═══════════════════════════════════════════════════
//  FILTER + SORT
// ═══════════════════════════════════════════════════
function filtered(){
  let arr = aiIDs ? PRODUCTS.filter(p=>aiIDs.includes(p.id)) : [...PRODUCTS];
  if(selCat!=="All" && !aiIDs) arr=arr.filter(p=>p.category===selCat);
  if(inStockOnly) arr=arr.filter(p=>p.inStock);
  if(searchTerm && !aiIDs){ const q=searchTerm.toLowerCase(); arr=arr.filter(p=>p.name.toLowerCase().includes(q)); }
  arr=arr.filter(p=>p.price<=maxPrice);
  if(sortBy==="price_asc")  arr.sort((a,b)=>a.price-b.price);
  else if(sortBy==="price_desc") arr.sort((a,b)=>b.price-a.price);
  else if(sortBy==="name")  arr.sort((a,b)=>a.name.localeCompare(b.name));
  return arr;
}
function applyFilters(){
  inStockOnly = document.getElementById("stockToggle").checked;
  maxPrice    = Number(document.getElementById("priceSlider").value);
  sortBy      = document.getElementById("sortSelect").value;
  renderGrid(filtered());
}
function updatePriceLabel(){
  const v = Number(document.getElementById("priceSlider").value);
  const max = Number(document.getElementById("priceSlider").max);
  document.getElementById("priceDisplay").textContent = v>=max ? `${fmt(v)} RWF` : `Up to ${fmt(v)} RWF`;
}
function clearAll(){
  selCat="All"; aiIDs=null; searchTerm="";
  document.getElementById("stockToggle").checked=false;
  const slider=document.getElementById("priceSlider");
  slider.max=MAX_PRICE; slider.value=MAX_PRICE;
  document.getElementById("sortSelect").value="featured";
  document.getElementById("searchInput").value="";
  document.getElementById("aiBar").classList.remove("show");
  updatePriceLabel();
  buildCats(); applyFilters();
  heroFocusCat("All");
}
function clearAI(){ aiIDs=null; document.getElementById("aiBar").classList.remove("show"); applyFilters(); }

function inCart(id){ return (cart.find(i=>i.id===id)||{qty:0}).qty; }

function renderGrid(prods){
  const grid  = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  document.getElementById("resultCount").textContent = prods.length;
  const hc = document.getElementById("heroProductCount");
  if(hc) hc.textContent = prods.length + " products";
  if(!prods.length){ grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  grid.innerHTML = prods.map(p=>{
    const qty  = inCart(p.id);
    const isNew= p.id%7===0, isHot=p.id%11===0;
    const fb   = fallbackImg(p.category).replace(/'/g,"\\'");
    return `<div class="card" onclick="openModal(${p.id})">
      <div class="card-img">
        <img src="${p.image}" alt="${esc(p.name)}" loading="lazy"
          onerror="this.onerror=null;this.src='${fb}'"/>
        ${!p.inStock?`<div class="card-oos-overlay"><span class="oos-pill">${tr("out_of_stock")}</span></div>`:""}
        <div class="card-badges">
          ${isNew?`<span class="badge badge-new">NEW</span>`:""}
          ${isHot?`<span class="badge badge-hot">🔥</span>`:""}
        </div>
        ${qty>0?`<div class="card-qty-dot">${qty}</div>`:""}
      </div>
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-unit">${p.unit}</div>
      </div>
      <div class="card-foot">
        <div class="card-price">${fmt(p.price)} <small>RWF</small></div>
        <button class="add-btn${qty>0?" added":""}"
          onclick="event.stopPropagation();addItem(${p.id})"
          ${!p.inStock?"disabled":""}>
          ${qty>0?"✓":"+"}
        </button>
      </div>
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════
//  CART
// ═══════════════════════════════════════════════════
function addItem(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(!p||!p.inStock) return;
  const i=cart.findIndex(x=>x.id===id);
  if(i>=0) cart[i].qty++; else cart.push({...p,qty:1});
  saveCart(); updateCartBadge(); renderGrid(filtered());
}
function setQty(id,q){
  if(q<=0) cart=cart.filter(x=>x.id!==id);
  else{ const i=cart.findIndex(x=>x.id===id); if(i>=0) cart[i].qty=q; }
  saveCart(); updateCartBadge(); renderGrid(filtered()); renderDrawer();
}
function saveCart(){ localStorage.setItem("simba_cart",JSON.stringify(cart)); }
function updateCartBadge(){
  const n=cart.reduce((s,i)=>s+i.qty,0);
  const b=document.getElementById("cartBadge");
  b.textContent=n; b.style.display=n>0?"flex":"none";
  document.getElementById("drawerCount").textContent=n>0?`(${n} items)`:"";
}

function openCart(){ document.getElementById("drawerWrap").classList.add("open"); renderDrawer(); }
function closeCart(){ document.getElementById("drawerWrap").classList.remove("open"); }

function renderDrawer(){
  const body=document.getElementById("drawerBody");
  if(!cart.length){
    body.innerHTML=`<div class="cart-empty-state"><div class="icon">🛒</div><p>${tr("cart_empty")}</p><button onclick="closeCart()">${tr("start_shopping")}</button></div>`;
    return;
  }
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  body.innerHTML=`
    <div class="drawer-body">${cart.map(item=>{
      const fb=fallbackImg(item.category).replace(/'/g,"\\'");
      return `<div class="ci">
        <div class="ci-img"><img src="${item.image}" onerror="this.onerror=null;this.src='${fb}'" alt=""/></div>
        <div class="ci-info">
          <div class="ci-name">${item.name}</div>
          <div class="ci-price">${fmt(item.price)} RWF</div>
          <div class="ci-row">
            <button class="qbtn" onclick="setQty(${item.id},${item.qty-1})">−</button>
            <span class="qval">${item.qty}</span>
            <button class="qbtn" onclick="setQty(${item.id},${item.qty+1})">+</button>
            <span class="ci-sub">${fmt(item.price*item.qty)}</span>
            <button class="ci-rm" onclick="setQty(${item.id},0)">${tr("remove")}</button>
          </div>
        </div>
      </div>`;
    }).join("")}</div>
    <div class="drawer-foot">
      <div class="tot-row"><span>${tr("subtotal")}</span><span>${fmt(sub)} RWF</span></div>
      <div class="tot-row"><span>${tr("free_pickup")}</span><span style="color:var(--green);font-weight:600">🎉 Free</span></div>
      <div class="tot-row final"><span>${tr("total")}</span><span>${fmt(sub)} RWF</span></div>
      <a href="checkout.html" class="checkout-btn">${tr("checkout")}</a>
    </div>`;
}

function openModal(id){
  modalProd=PRODUCTS.find(p=>p.id===id);
  if(!modalProd) return;
  const p=modalProd;
  const fb=fallbackImg(p.category).replace(/'/g,"\\'");
  document.getElementById("modalHero").innerHTML=
    `<img src="${p.image}" alt="${esc(p.name)}" onerror="this.onerror=null;this.src='${fb}'"/>`;
  document.getElementById("mCat").textContent=p.category;
  document.getElementById("mName").textContent=p.name;
  document.getElementById("mMeta").textContent=`${tr("unit")}: ${p.unit}  ·  SKU #${p.id}`;
  const s=document.getElementById("mStock");
  s.className="stock-chip "+(p.inStock?"in":"out");
  s.textContent=p.inStock?"✓ "+tr("in_stock"):"✗ "+tr("out_of_stock");
  document.getElementById("mPrice").innerHTML=`${fmt(p.price)} <small>RWF</small>`;
  const btn=document.getElementById("mAddBtn");
  btn.disabled=!p.inStock;
  btn.className="modal-add"+(inCart(p.id)?" added":"");
  btn.innerHTML=inCart(p.id)?`✓ Added`:`🛒 <span data-t="add_to_cart">${tr("add_to_cart")}</span>`;
  document.getElementById("modalWrap").classList.add("open");
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modalWrap"))
    document.getElementById("modalWrap").classList.remove("open");
}
function addFromModal(){
  if(!modalProd) return;
  addItem(modalProd.id);
  const btn=document.getElementById("mAddBtn");
  btn.className="modal-add added"; btn.innerHTML="✓ Added!";
  setTimeout(()=>{btn.className="modal-add";btn.innerHTML=`🛒 ${tr("add_to_cart")}`;},1500);
}

// ═══════════════════════════════════════════════════
//  SEARCH (keyword + Groq AI)
// ═══════════════════════════════════════════════════
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")handleSearch();});
document.getElementById("searchInput").addEventListener("input",e=>{
  const v=e.target.value.trim();
  if(!v){searchTerm="";aiIDs=null;document.getElementById("aiBar").classList.remove("show");applyFilters();}
  else{searchTerm=v;if(!aiIDs)applyFilters();}
});

async function handleSearch(){
  const q=document.getElementById("searchInput").value.trim();
  if(!q) return;
  const isAI=/\b(i need|do you have|show me|find me|something for|good for|recommend|best|cheap|affordable|what|how|can you|give me|ndashaka|ufite|je veux|avez-vous|montrez|besoin)\b/i.test(q);
  if(isAI) await groqSearch(q);
  else{ aiIDs=null; searchTerm=q; document.getElementById("aiBar").classList.remove("show"); applyFilters(); }
}

async function groqSearch(query){
  const btn=document.getElementById("searchBtn");
  btn.textContent="⏳"; btn.classList.add("loading");

  const sys=`You are a helpful assistant for Simba Supermarket Kigali, Rwanda. Prices are in RWF.
Product catalog (id|name|price|category|inStock):
${CATALOG}
Respond ONLY with valid JSON (no markdown):
{"reply":"Friendly 1-2 sentence response in the SAME language as the user","ids":[id1,id2,...]}
Max 20 ids.`;

  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({model:GROQ_MODEL,max_tokens:500,temperature:0.2,
        messages:[{role:"system",content:sys},{role:"user",content:query}]})
    });
    const data=await res.json();
    const raw=(data.choices?.[0]?.message?.content||"{}").replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    aiIDs=parsed.ids||[];
    selCat="All"; searchTerm="";
    buildCats(); applyFilters();
    document.getElementById("aiText").innerHTML=`<strong>🤖 Simba AI:</strong> ${parsed.reply||"Here are the matching products!"}`;
    document.getElementById("aiBar").classList.add("show");
  }catch(err){
    console.warn("Groq fallback:",err);
    aiIDs=null; searchTerm=query; applyFilters();
    document.getElementById("aiText").innerHTML=`<strong>🤖 Simba AI:</strong> Showing keyword results for "<em>${query}</em>"`;
    document.getElementById("aiBar").classList.add("show");
  }finally{
    btn.textContent="🔍"; btn.classList.remove("loading");
  }
}

let heroIdx = 0;
let heroTimer = null;

function buildHero(){
  const slidesEl = document.getElementById("heroSlides");
  const dotsEl   = document.getElementById("heroDots");
  slidesEl.innerHTML = "";
  dotsEl.innerHTML   = "";
  HERO_SLIDES.forEach((s,i)=>{
    const slide = document.createElement("div");
    slide.className = "hero-slide"+(i===0?" active":"");
    slide.innerHTML = `
      <div class="hero-slide-img" style="background-image:url('${s.img}')"></div>
      <div class="hero-slide-overlay"></div>
      <div class="hero-slide-content">
        <div>
          <div class="hero-slide-label">${s.label}</div>
          <div class="hero-slide-title">${s.title.replace("\n","<br>")}</div>
          <div class="hero-slide-sub">${s.sub}</div>
        </div>
        <button class="hero-shop-btn" onclick="pickCat('${s.cat}');window.scrollTo({top:document.querySelector('.main').offsetTop-70,behavior:'smooth'})">
          Shop Now →
        </button>
      </div>`;
    slidesEl.appendChild(slide);
    const dot = document.createElement("button");
    dot.className = "hero-dot"+(i===0?" active":"");
    dot.onclick   = ()=>heroGoTo(i);
    dotsEl.appendChild(dot);
  });
  heroStartTimer();
}

function heroGoTo(n){
  const slides = document.querySelectorAll(".hero-slide");
  const dots   = document.querySelectorAll(".hero-dot");
  slides[heroIdx].classList.remove("active");
  dots[heroIdx].classList.remove("active");
  heroIdx = (n + HERO_SLIDES.length) % HERO_SLIDES.length;
  slides[heroIdx].classList.add("active");
  dots[heroIdx].classList.add("active");
  document.getElementById("heroSlides").style.transform = `translateX(-${heroIdx*100}%)`;
  heroStartTimer();
}

function heroMove(dir){ heroGoTo(heroIdx+dir); }

function heroStartTimer(){
  clearInterval(heroTimer);
  heroTimer = setInterval(()=>heroGoTo(heroIdx+1), 5000);
}

// Jump hero to the slide matching the selected category; stop slideshow unless "All"
function heroFocusCat(cat){
  if(cat==="All"){
    // Resume slideshow from current slide
    heroStartTimer();
    // Show arrows + dots
    document.querySelector(".hero-arrow.prev").style.display="";
    document.querySelector(".hero-arrow.next").style.display="";
    document.getElementById("heroDots").style.display="";
    return;
  }
  // Find matching slide index
  const idx = HERO_SLIDES.findIndex(s=>s.cat===cat);
  if(idx<0) return;
  // Stop slideshow
  clearInterval(heroTimer);
  // Hide arrows and dots (locked to this category slide)
  document.querySelector(".hero-arrow.prev").style.display="none";
  document.querySelector(".hero-arrow.next").style.display="none";
  document.getElementById("heroDots").style.display="none";
  // Jump to that slide
  const slides = document.querySelectorAll(".hero-slide");
  const dots   = document.querySelectorAll(".hero-dot");
  slides[heroIdx].classList.remove("active");
  if(dots[heroIdx]) dots[heroIdx].classList.remove("active");
  heroIdx = idx;
  slides[heroIdx].classList.add("active");
  if(dots[heroIdx]) dots[heroIdx].classList.add("active");
  document.getElementById("heroSlides").style.transform = `translateX(-${heroIdx*100}%)`;
}
